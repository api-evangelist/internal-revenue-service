apis:
  - aid: internal-revenue-service:modernized-e-file
    name: IRS Modernized e-File (MeF)
    description: >-
      The IRS Modernized e-File (MeF) system is the web-based electronic
      filing platform supporting individual, business, and tax-exempt return
      submission via XML-based schemas. Software developers and transmitters
      integrate with MeF to submit returns and receive acknowledgements.
    humanURL: https://www.irs.gov/e-file-providers/modernized-e-file-mef-internet-filing
    tags:
      - Federal Government
      - Tax Filing
    properties:
      - type: Documentation
        url: https://www.irs.gov/e-file-providers/modernized-e-file-mef-internet-filing
      - type: Schemas
        url: https://www.irs.gov/e-file-providers/modernized-e-file-mef-schemas-and-business-rules
      - type: Guide
        url: https://www.irs.gov/pub/irs-pdf/p4164.pdf
  - aid: internal-revenue-service:e-services
    name: IRS e-Services
    description: >-
      IRS e-Services is a suite of web-based products for tax professionals,
      reporting agents, and authorized e-file providers offering Transcript
      Delivery, TIN Matching, e-file application management, and secure
      messaging for electronic interactions with the IRS.
    humanURL: https://www.irs.gov/tax-professionals/e-services
    tags:
      - Federal Government
      - Tax Professionals
    properties:
      - type: Documentation
        url: https://www.irs.gov/tax-professionals/e-services
