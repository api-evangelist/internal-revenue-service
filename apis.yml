aid: internal-revenue-service
name: Internal Revenue Service
description: >-
  The Internal Revenue Service (IRS) is the United States federal tax
  collection agency and a bureau of the Department of the Treasury. The IRS
  publishes developer resources for tax software providers and transmitters
  including the Modernized e-File (MeF) system for electronic tax return
  submission, the e-Services suite for authorized e-file providers, and
  Publication 4164 (the MeF Guide for Software Developers and Transmitters)
  which documents the XML schemas and transmission protocols required for
  integration.
type: Index
